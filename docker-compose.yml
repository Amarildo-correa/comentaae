services:
  # O Porteiro (Nginx)
  nginx:
    image: nginx:alpine
    container_name: comentaae_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app_ssr
    restart: always

  # Módulo SSR
  app_ssr:
    build: .
    container_name: comentaae_ssr
    # Note: Removi a porta 3001 daqui para ela não ficar exposta na internet
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: always

  # Banco de Dados
  db:
    image: mysql:8.0
    container_name: comentaae_db
    environment:
      MYSQL_DATABASE: db_comentaae
      MYSQL_ROOT_PASSWORD: senha_mestre_comentaae
    volumes:
      - comentaae_db_data:/var/lib/mysql
    restart: always

  # Cache
  redis:
    image: redis:alpine
    container_name: comentaae_redis
    restart: always

volumes:
  comentaae_db_data:
